<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What to Watch</title>
  </head>
  <body>
    <h1>What to Watch</h1>

    <form action="/filmLiveSearch/" method="GET">
      <label for="query">Search for a film</label>
      <input
        id="query"
        name="query"
        type="text"
        placeholder="Try: woman"
        required
      />
      <button type="submit">Search</button>
    </form>
  </body>
</html>
